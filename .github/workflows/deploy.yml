name: Deploy

on:
  workflow_run:
    workflows: ["CI Checks"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  should_deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.gate.outputs.deploy }}
    steps:
      - name: Skip version-bump commits
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          MSG=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}" --jq .commit.message)
          if echo "$MSG" | grep -qi '\[skip ci\]'; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=true" >> "$GITHUB_OUTPUT"
          fi

  prepare:
    needs: should_deploy
    if: ${{ needs.should_deploy.outputs.deploy == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Bump minor version
        id: version
        run: echo "version=$(node scripts/bump-minor-version.mjs)" >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        id: release
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release v${{ steps.version.outputs.version }} [skip ci]"
          git push
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  package-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      # No `cache: npm` on Windows: setup-node/actions/cache can silently abort
      # or corrupt restore (actions/cache#1754).
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: node scripts/npm-ci-with-retry.mjs

      - name: Ensure Electron binary is installed
        run: node node_modules/electron/install.js

      - run: npm run package:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: release/*
          if-no-files-found: error

  package-mac:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - run: npm ci

      - name: Package macOS app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npm run package:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-release
          path: release/*
          if-no-files-found: error

  release:
    needs: [prepare, package-windows, package-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # --generate-notes needs .git; verify script needs scripts/ from the repo
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: '*-release'
          merge-multiple: true
          path: release

      - name: Sanitize and verify updater metadata
        run: node scripts/verify-release-artifacts.mjs release

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mapfile -t assets < <(find release -maxdepth 1 -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release artifacts found in release/"
            exit 1
          fi
          printf 'Uploading:\n%s\n' "${assets[@]}"
          gh release create "v${{ needs.prepare.outputs.version }}" "${assets[@]}" \
            --repo "${{ github.repository }}" \
            --title "AI-TTRPG v${{ needs.prepare.outputs.version }}" \
            --generate-notes
