name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  package:
    # Disabled by default. To enable automatic packaging on merge to main,
    # change this to `if: true` (or remove the line entirely) once ready to ship builds automatically.
    if: false
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npm run package
